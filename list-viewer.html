<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Lists</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
  
    body { 
		background:#111; 
		color:white; 
		padding-top: calc(env(safe-area-inset-top) + 90px);
		}
		
		
	.container {
	  padding-top: 90px;
	}
	
    .list-box {
      background:#222;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
      cursor:pointer;
    }
	
    .entry-item {
      background:#333;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
	
    .btn-delete {
      background:#b30000;
      border:none;
      padding:5px 10px;
      border-radius:5px;
      color:white;
    }
	
    .btn-delete:hover {
      background:#ff1a1a;
    }
	
	.home-button-container {
	  position: fixed;
	  top: calc(env(safe-area-inset-top) + 10px);
	  right: 15px;
	  z-index: 9999;
	}

	.home-button-container .cat-home-btn {
	  padding: 0.45rem 1.2rem;
	  font-size: 1rem;
	  font-weight: 600;
	  border-radius: 30px;
	  border: none;
	  background: linear-gradient(135deg, #ff9f1c, #ffbf69);
	  color: #111;
	  box-shadow: 0 0 10px rgba(255, 159, 28, 0.6);
	  transition: transform 0.25s ease, box-shadow 0.25s ease;
	}

	.home-button-container .cat-home-btn:hover {
	  transform: scale(1.05);
	  box-shadow: 0 0 14px rgba(255, 159, 28, 0.8);
	}
	
	.icon-btn i.fa-trash {
	  color: #ff2e2e;
	}
	
	
	/* Fade + slide up */
	.list-animate {
	  opacity: 0;
	  transform: translateY(10px);
	  animation: fadeSlideIn 0.35s ease forwards;
	}

	@keyframes fadeSlideIn {
	  from {
		opacity: 0;
		transform: translateY(10px);
	  }
	  to {
		opacity: 1;
		transform: translateY(0);
	  }
	}

	/* Fade-out effect */
	.fade-out {
	  opacity: 0;
	  transition: opacity 0.25s ease;
	}
	
	
	
	.cat-button-wrapper {
	  position: relative;
	  display: inline-block;
	}
	
	.icon-btn, .action-btn {
	  background: rgba(255,255,255,0.08);
	  border: 1px solid rgba(255,255,255,0.15);
	  padding: 8px;
	  border-radius: 10px;
	  min-width: 40px;
	  min-height: 40px;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  color: white;
	  font-size: 1.0rem;
	  transition: background 0.2s ease, transform 0.15s ease;
	}

	.icon-btn:hover, .action-btn:hover {
	  background: rgba(255,255,255,0.18);
	  transform: scale(1.08);
	}
	
	.check-btn {
	  min-width: 38px;
	  min-height: 38px;
	  border-radius: 10%;
	  border: 2px solid #ccc;
	  background-color: white;
	  font-size: 18px;
	  color: #335;
	  cursor: pointer;
	  transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	}

	.check-btn.checked {
	  background-color: #28a745;
	  border-color: #28a745;
	  color: white;
	}
	
	.check-btn i {
	  font-size: 18px;
	  color: #335;
	}

	.check-btn.checked i {
	  color: white;
	}


	.button-group {
	  display: flex;
	  gap: 6px;
	  align-items: center;
	}


  </style>
</head>


	<div class="home-button-container">

	  <button class="btn btn-success cat-home-btn" onclick="goHome()">🐈 Home</button>
	  <div id="cat" class="doodle-cat"></div>
	</div>


<body>


  <div class="container py-4">

    <h2 class="mb-4 text-center" id="listTitle">📚 My Lists</h2>

	<div id="deleteModal" class="modal fade" tabindex="-1">
	  <div class="modal-dialog modal-dialog-centered">
		<div class="modal-content bg-dark text-white">
		  <div class="modal-body text-center">
			<p id="deleteMessage">Are you sure?</p>
			<button id="confirmDelete" class="btn btn-danger mt-2">Delete</button>
			<button class="btn btn-secondary mt-2" data-bs-dismiss="modal">Cancel</button>
		  </div>
		</div>
	  </div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<div class="text-center mb-3">
	  <button class="btn btn-outline-light me-2" onclick="setFilter('All')">All</button>
	  <button class="btn btn-outline-light me-2" onclick="setFilter('Drinks')">🥤 Drinks</button>
	  <button class="btn btn-outline-light me-2" onclick="setFilter('Cinema')">🎬 Cinema</button>
	  <button class="btn btn-outline-light me-2" onclick="setFilter('Food')">🍽️ Food</button>
	  <button class="btn btn-outline-light me-2" onclick="setFilter('Other')">🧩 Other</button>
	  <button class="btn btn-outline-light me-2" onclick="setFilter('Checked')">✔️ Checked</button>
	</div>
	
    <div id="listsContainer"></div>

	<!--<div class="text-center mt-4">
	  <a href="list-viewer.html" onclick="localStorage.removeItem('currentList')" class="btn btn-secondary">
		⬅ View My Lists
	  </a>
	</div>-->


  </div>

<script>

	const categoryIcons = {
	  Drinks: "🥤",
	  Cinema: "🎬",
	  Food: "🍽️",
	  Other: "🧩",
	  Checked: "✔️",
	  Uncategorized: "📦"
	};

	let currentFilter = "All";
	function setFilter(category) {
	  currentFilter = category;

	  // Leave single-list mode if a list is open
	  localStorage.removeItem("currentList");

	  const container = document.getElementById("listsContainer");
	  container.classList.add("fade-out");

	  setTimeout(() => {
		loadLists();
		container.classList.remove("fade-out");
	  }, 150);
	}
	
	let deleteCallback = null;

	function showDeleteModal(message, callback) {
	  document.getElementById("deleteMessage").textContent = message;
	  deleteCallback = callback;

	  const modal = new bootstrap.Modal(document.getElementById("deleteModal"));
	  modal.show();

	  document.getElementById("confirmDelete").onclick = () => {
		callback();
		modal.hide();
		document.activeElement.blur(); 
	  };
	}

	function createGoogleLink(query) {
	  if (!query) return "https://www.google.com";
	  return `https://www.google.com/search?q=${encodeURIComponent(query)}`;
	}

	function createGoogleMapsLink(query) {
	  if (!query) return "https://www.google.com/maps";
	  return `https://www.google.com/maps/search/${encodeURIComponent(query)}`;
	}

	function toggleCheckList(button) {
	  const id = button.dataset.id;

	  const lists = JSON.parse(localStorage.getItem("lists")) || {};
	  const entries = JSON.parse(localStorage.getItem("entries")) || [];

	  const selected = localStorage.getItem("currentList");
	  if (!selected || !lists[selected]) return;

	  const item = lists[selected].items.find(e => e.id == id);
	  if (!item) return;

	  const isChecked = !item.checked;
	  item.checked = isChecked;

	  const entry = entries.find(e => e.id == id);
	  if (entry) entry.checked = isChecked;

	  localStorage.setItem("lists", JSON.stringify(lists));
	  localStorage.setItem("entries", JSON.stringify(entries));

	  // ❌ remove all iconEl / classList stuff
	  // ✅ just re-render
	  loadLists();
	}



function formatEntry(entry) {

  console.log("FORMAT ENTRY RUNNING", entry.id);
  const isListView = localStorage.getItem("currentList") !== null;
  const checkHandler = isListView ? "toggleCheckList(this)" : "toggleCheck(this)";

  let content = "";
  let googleSearchLink = "";
  let googleMapsLink = "";

  if (entry.type === "Drinks") {
    const query = entry.placeName;
    googleSearchLink = createGoogleLink(query);
    googleMapsLink = createGoogleMapsLink(entry.placeName);

    content = `
      <div class="entry-info">
        <div>🥤: ${entry.placeName}</div>
        <div>Region: ${entry.drinkType}</div>
        <div>⭐ ${entry.Rating || "N/A"}</div>
      </div>
    `;
	
  }

  else if (entry.type === "Cinema") {
    const query = entry.movieName;
    googleSearchLink = createGoogleLink(query);
    googleMapsLink = createGoogleMapsLink(entry.cinemaName);

    content = `
      <div class="entry-info">
        <div>🎬: ${entry.movieName}</div>
        <div>Cinema: ${entry.cinemaName}</div>
        <div>⭐ ${entry.Rating || "N/A"}</div>
      </div>
    `;
  }

  else if (entry.type === "Food") {
    const query = entry.placeName;
    googleSearchLink = createGoogleLink(query);
    googleMapsLink = createGoogleMapsLink(entry.placeName);

    content = `
      <div class="entry-info">
        <div>🍽️ Place: ${entry.placeName}</div>
        <div>Cuisine: ${entry.cuisineType}</div>
        <div>⭐ ${entry.Rating || "N/A"}</div>
      </div>
    `;
  }

  else if (entry.type === "Other") {
    const query = entry.otherName;
    googleSearchLink = createGoogleLink(query);
    googleMapsLink = createGoogleMapsLink(entry.otherName);

    content = `
      <div class="entry-info">
        <div>🧩 Other: ${entry.otherName}</div>
        <div>Type: ${entry.otherType}</div>
        <div>⭐ ${entry.Rating || "N/A"}</div>
      </div>
    `;
  }

  const entryId = `entry-${entry.id}`;
  const entrySummary = buildEntrySummary(entry);

  return `
    <li class="list-group-item bg-dark text-white entry-item">

      <div class="entry-header">
        ${content}

        <button class="check-btn action-btn ${entry.checked ? 'checked' : ''}"
                data-id="${entry.id}"
                onclick="${checkHandler}">
          <i class="fa-solid ${entry.checked ? 'fa-check-circle' : 'fa-check'}"></i>
        </button>
		
		
		
      </div>

      <div class="button-group">

        <a href="${googleSearchLink}" target="_blank" class="icon-btn">
          <img src="https://www.google.com/favicon.ico" style="width:20px; height:20px;">
        </a>

        <a href="${googleMapsLink}" target="_blank" class="icon-btn">📍 Map</a>

        <button id="${entryId}-share"
                class="icon-btn"
                onclick="shareEntry('${entrySummary.replace(/'/g, "\\'")}')">🔗</button>

        <button class="icon-btn" onclick="deleteEntry('${entry.id}')">
          <i class="fa-solid fa-trash"></i>
        </button>

        <button class="icon-btn"
                onclick="openAddToListPanel('${entry.id}')">➕</button>

      </div>

    </li>
  `;
  

}


	function buildEntrySummary(entry) {
	  if (entry.type === "Cinema") {
		return `🎬 Movie: ${entry.movieName}, Cinema: ${entry.cinemaName}, ⭐: ${entry.Rating || 'N/A'}`;
	  } else if (entry.type === "Drinks") {
		return `🥤 Place: ${entry.placeName}, Region: ${entry.drinkType}, ⭐: ${entry.Rating || 'N/A'}`;
	  } else if (entry.type === "Food") {
		return `🍽️ Place: ${entry.placeName}, Cuisine: ${entry.cuisineType}, ⭐: ${entry.Rating || 'N/A'}`;
	  } else if (entry.type === "Other") {
		return `🧩 Other: ${entry.otherName}, Description: ${entry.otherType}, ⭐: ${entry.Rating || 'N/A'}`;
	  }
	  
	  
	  return "Unknown entry";
	}
	
	function deleteEntry(id) {
	  showDeleteModal("Delete from list?", () => {

		// Remove from main entries
		const entries = JSON.parse(localStorage.getItem("entries")) || [];
		const index = entries.findIndex(e => e.id === id);

		if (index !== -1) {
		  entries.splice(index, 1);
		  localStorage.setItem("entries", JSON.stringify(entries));
		}

		// Remove from all lists
		const lists = JSON.parse(localStorage.getItem("lists")) || {};
		for (const listName in lists) {
		  lists[listName].items = lists[listName].items.filter(e => e.id !== id);

		  // If list becomes empty, delete it
		  if (lists[listName].items.length === 0) {
			delete lists[listName];
		  }
		}
		localStorage.setItem("lists", JSON.stringify(lists));

		// Refresh UI depending on where we are
		const selected = localStorage.getItem("currentList");

		if (selected) {
		  // We are inside a list viewer
		  loadLists();
		} else {
		  // We are on the main page
		  searchCategory(currentCategory);
		}
	  });
	}

		
	function toggleCheck(button) {
	  const id = button.dataset.id;

	  const entries = JSON.parse(localStorage.getItem("entries")) || [];
	  const entry = entries.find(e => e.id == id);
	  if (!entry) return;

	  const isChecked = !entry.checked;
	  entry.checked = isChecked;

	  localStorage.setItem("entries", JSON.stringify(entries));

	  // ⭐ Sync lists
	  syncListsWithEntries(id, isChecked);

	  // Update visual
	  const iconEl = button.querySelector("i");
	  button.classList.toggle("checked", isChecked);

	  if (isChecked) {
		iconEl.classList.remove("fa-circle");
		iconEl.classList.add("fa-check-circle");
	  } else {
		iconEl.classList.remove("fa-check-circle");
		iconEl.classList.add("fa-circle");
	  }

	  // Refresh list view if inside list
	  const selected = localStorage.getItem("currentList");
	  if (selected) loadLists();
	}





	function syncEntriesWithLists(id, checked) {
	  const entries = JSON.parse(localStorage.getItem("entries")) || [];
	  const entry = entries.find(e => e.id == id);
	  if (!entry) return;

	  entry.checked = checked;
	  localStorage.setItem("entries", JSON.stringify(entries));
	}
	
	
	function syncListsWithEntries(id, checked) {
	  const lists = JSON.parse(localStorage.getItem("lists")) || {};

	  for (const listName in lists) {
		const list = lists[listName];
		const item = list.items.find(e => e.id == id);
		if (item) item.checked = checked;
	  }

	  localStorage.setItem("lists", JSON.stringify(lists));
	}



	function loadLists() {
	  const container = document.getElementById("listsContainer");
	  const title = document.getElementById("listTitle");

	  const lists = JSON.parse(localStorage.getItem("lists")) || {};
	  const selected = localStorage.getItem("currentList");

	  // MODE B: Show only the selected list
	  if (selected && lists[selected]) {
		title.textContent = `📚 ${selected}`;

		const listObj = lists[selected];        // NEW
		const items = listObj.items || [];      // NEW

		container.innerHTML = `
		  <div class="list-box">
			${items.map(item => formatEntry(item)).join("")}
		  </div>
		`;
		return;
	  }

	  // MODE A: Show all lists
	  title.textContent = "📚 My Lists";

	  if (Object.keys(lists).length === 0) {
		container.innerHTML = `<p class="text-muted text-center">No lists found.</p>`;
		return;
	  }

	  let html = "";
	  for (const listName in lists) {
		 const list = lists[listName];
		// FILTER LOGIC
	    const category = lists[listName].category || "Uncategorized";
		  if (currentFilter !== "All" && category !== currentFilter) {
			continue; // skip lists that don't match
		  }
		const count = lists[listName].items?.length || 0;
		  // ⭐ FIX: define icon properly
		  const icon = list.icon || categoryIcons[category] || "📦";
		
		html += `
	
		<div class="list-box list-animate d-flex justify-content-between align-items-center">


		  <div onclick="openList('${listName}')">
			<h4 class="mb-1 d-flex align-items-center">
			  ${icon} ${listName}
			  <span class="badge bg-info ms-2">${count}</span>
			</h4>
		  </div>

		  <button class="btn btn-danger btn-sm"
				  onclick="event.stopPropagation(); deleteList('${listName}')">
			Delete
		  </button>

		</div>
	  `;
	  }

	  container.innerHTML = html;
	}

	function openList(listName) {
	  localStorage.setItem("currentList", listName);
	  loadLists();
	}


	function deleteItem(listName, index) {
	  showDeleteModal("Delete this item?", () => {
		const lists = JSON.parse(localStorage.getItem("lists")) || {};
		 // FIXED: delete from items array
		lists[listName].items.splice(index, 1);
		// If list becomes empty, delete it
		if (lists[listName].items.length === 0) {
		  delete lists[listName];
		  localStorage.removeItem("currentList");
		}

		localStorage.setItem("lists", JSON.stringify(lists));
		loadLists();
	  });
	}

	

	function deleteList(listName) {
	  showDeleteModal(`Delete the list "${listName}"?`, () => {
		const lists = JSON.parse(localStorage.getItem("lists")) || {};
		delete lists[listName];

		if (localStorage.getItem("currentList") === listName) {
		  localStorage.removeItem("currentList");
		}

		localStorage.setItem("lists", JSON.stringify(lists));
		loadLists();
	  });
	}





function goHome() {
  document.body.classList.add('fade-out');
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 300);
}

window.addEventListener("DOMContentLoaded", () => {
  const entries = JSON.parse(localStorage.getItem("entries")) || [];
  loadLists();
});


</script>

</body>
</html>
